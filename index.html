<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Nandani ❤️</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
body{overflow:hidden;color:white;text-align:center;}

/* VIDEO */
video{
position:fixed;
right:0;
bottom:0;
min-width:100%;
min-height:100%;
object-fit:cover;
z-index:-2;
transition:1s ease;
}

.blur{
filter:blur(8px);
transform:scale(1.05);
}

.overlay{
position:fixed;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
z-index:-1;
}

/* CENTER */
.center{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:90%;
max-width:420px;
}

/* BUTTON */
.btn{
padding:12px 25px;
border:none;
border-radius:30px;
background:#ff4d6d;
color:white;
font-size:16px;
cursor:pointer;
margin-top:20px;
}

/* ENVELOPE */
.envelope{
width:280px;
height:180px;
background:#f5e6d3;
border-radius:10px;
position:relative;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
margin:auto;
display:none;
}

.flap{
position:absolute;
width:0;height:0;
border-left:140px solid transparent;
border-right:140px solid transparent;
border-bottom:90px solid #e6d2bd;
top:-90px;
transition:1.5s ease;
transform-origin:bottom;
}

.open .flap{transform:rotateX(180deg);}

.heart{
position:absolute;
top:50%;left:50%;
transform:translate(-50%,-50%);
font-size:40px;
cursor:pointer;
animation:pulse 1.5s infinite;
}

@keyframes pulse{
0%{transform:translate(-50%,-50%) scale(1);}
50%{transform:translate(-50%,-50%) scale(1.1);}
100%{transform:translate(-50%,-50%) scale(1);}
}

/* LETTER */
.letter{
position:absolute;
top:50%;left:50%;
transform:translate(-50%,-50%);
width:90%;max-width:420px;
padding:25px;
border-radius:15px;
background:linear-gradient(135deg,#ffe6f0,#fff0f5,#e6f7ff);
box-shadow:0 15px 40px rgba(0,0,0,0.5);
display:none;
color:#333;
text-align:left;
}

.cursor{
display:inline-block;
width:2px;
background:#333;
animation:blink 1s infinite;
}

@keyframes blink{
0%,50%,100%{opacity:1;}
25%,75%{opacity:0;}
}

/* PROMISE */
.promise{
position:absolute;
top:50%;left:50%;
transform:translate(-50%,-50%);
width:90%;max-width:420px;
display:none;
color:white;
}

.promise-box{
background:rgba(255,255,255,0.1);
padding:25px;
border-radius:20px;
backdrop-filter:blur(10px);
box-shadow:0 15px 40px rgba(0,0,0,0.5);
}

.final-line{
margin-top:20px;
font-size:20px;
font-weight:bold;
color:#ffccd5;
}
</style>
</head>

<body>

<video autoplay loop muted id="bgVideo">
<source src="Happy Holi 2024 By CWS.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<!-- WELCOME -->
<div class="center" id="welcome">
<h1>Happy Holi My Love ❤️</h1>
<p>I am your Raj, your pookie 💕</p>
<button class="btn" onclick="startEnvelope()">Tap To Begin 💌</button>
</div>

<!-- ENVELOPE -->
<div class="center">
<div class="envelope" id="envelope">
<div class="flap"></div>
<div class="heart" id="heart">❤️</div>
</div>
</div>

<!-- LETTER -->
<div class="letter" id="letter">
<h3>My Letter To You 💌</h3>
<p id="letterText"></p>
<span class="cursor"></span><br>
<button class="btn" onclick="showPromise()">One Last Thing ❤️</button>
</div>

<!-- PROMISE -->
<div class="promise" id="promise">
<div class="promise-box">
<h3>New Holi, New Start 💖</h3>
<p id="promiseText"></p>
<div class="final-line">Please Nandani, My Love ❤️</div>
</div>
</div>

<script>
let clickCount=0;

function startEnvelope(){
document.getElementById("welcome").style.display="none";
document.getElementById("envelope").style.display="block";
}

document.getElementById("heart").addEventListener("click",function(){
clickCount++;
if(clickCount===1){navigator.vibrate&&navigator.vibrate(100);}
else if(clickCount===2){navigator.vibrate&&navigator.vibrate(200);}
else if(clickCount===3){
document.getElementById("envelope").classList.add("open");
document.getElementById("bgVideo").classList.add("blur");
setTimeout(()=>{
document.getElementById("letter").style.display="block";
typeLetter();
},1500);
}
});

const letterMessage=`Nandani,

I’m really sorry... I know meri galti thi.
Par jab tum door rehti ho na, dil heavy ho jata hai.

Tum hi bolti ho hum dono ek hain ❤️
Hamra relationship sabse acha hai,
bas time thoda tough chal raha hai.

Please maaf kar do na...
Ek baar waise hi muskura do ❤️

Forever Yours,
Raj 💖`;

function typeLetter(){
let i=0;
let speed=40;
function typing(){
if(i<letterMessage.length){
document.getElementById("letterText").innerHTML+=letterMessage.charAt(i);
i++;
setTimeout(typing,speed);
}
}
typing();
}

function showPromise(){
document.getElementById("letter").style.display="none";
document.getElementById("promise").style.display="block";
typePromise();
}

const promiseMessage=`Yaar sab baatein bhula dete hain na...

Iss Holi hum naye rang se apni story shuru karte hain 🌈
Jo bhi misunderstanding thi,
unhe paani me ghul jaane dete hain jaise Holi ke rang 💕

New Holi.
New Start.
Same Love.
But stronger than before ❤️`;

function typePromise(){
let i=0;
let speed=40;
function typing(){
if(i<promiseMessage.length){
document.getElementById("promiseText").innerHTML+=promiseMessage.charAt(i);
i++;
setTimeout(typing,speed);
}
}
typing();
}
</script>

</body>
</html>
